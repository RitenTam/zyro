name: Lighthouse CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Start static server
        run: npx serve -s dist -l 8080 &
      - name: Wait for server
        run: |
          for i in {1..15}; do
            if curl -sSf http://localhost:8080 >/dev/null; then
              echo "server up"; break;
            fi
            sleep 1
          done
      - name: Run LHCI
        run: npx lhci autorun --collect.url=http://localhost:8080 --upload.target=temporary-public-storage
